<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ShinoBee Legal</title>
    <meta name="description" content="ShinoBee legal and support pages." />
    <style>
      :root {
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --line: #e2e8f0;
        --accent: #4f46e5;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        color: var(--text);
        background: var(--bg);
      }
      .wrap {
        max-width: 860px;
        margin: 0 auto;
        padding: 24px 16px 56px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
      }
      h1 { margin: 0 0 10px; font-size: 30px; }
      p, li { color: var(--muted); line-height: 1.7; }
      a { color: var(--accent); }
      ul { padding-left: 20px; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <article class="card">
        <h1>ShinoBee Legal</h1>
        <p>Official legal and support pages for the ShinoBee app.</p>
        <ul>
          <li><a href="./privacy.html">Privacy Policy</a></li>
          <li><a href="./terms.html">Terms of Use</a></li>
          <li><a href="./support.html">Support</a></li>
        </ul>
      </article>
    </main>
  </body>
</html>
