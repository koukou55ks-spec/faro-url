<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Faro Support & Privacy</title>
    <meta
      name="description"
      content="Official support and privacy pages for the Faro language learning app."
    />
    <style>
      :root {
        --bg: #f6f7fb;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --line: #e2e8f0;
        --accent: #4f46e5;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top, #eef2ff 0%, var(--bg) 45%);
      }
      .wrap {
        max-width: 860px;
        margin: 0 auto;
        padding: 24px 16px 56px;
      }
      .hero {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.06);
      }
      h1 { margin: 0 0 8px; font-size: 32px; }
      p { margin: 0; line-height: 1.6; color: var(--muted); }
      .grid {
        margin-top: 18px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 12px;
      }
      a.card {
        display: block;
        text-decoration: none;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 18px;
        color: inherit;
      }
      a.card:hover { border-color: #c7d2fe; }
      .kicker { color: var(--accent); font-weight: 700; font-size: 13px; }
      .title { margin-top: 4px; font-size: 20px; font-weight: 700; }
      .desc { margin-top: 6px; font-size: 14px; color: var(--muted); }
      footer {
        margin-top: 20px;
        font-size: 13px;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="hero">
        <h1>Faro</h1>
        <p>Official links for App Store listing and user support.<br />App Store提出用の公式リンクです。</p>
      </section>

      <section class="grid" aria-label="Main links">
        <a class="card" href="./support.html">
          <div class="kicker">Support</div>
          <div class="title">Support / サポート</div>
          <div class="desc">How to contact us, help topics, and response policy.</div>
        </a>
        <a class="card" href="./privacy.html">
          <div class="kicker">Privacy</div>
          <div class="title">Privacy Policy / プライバシーポリシー</div>
          <div class="desc">How Faro handles your information and your rights.</div>
        </a>
      </section>

      <footer>
        Contact: <a href="mailto:vpn06818@gmail.com">vpn06818@gmail.com</a>
      </footer>
    </main>
  </body>
</html>
